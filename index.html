<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 專屬戀愛任務系統</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffe6f0, #fff0f5);
    text-align: center;
    padding: 20px;
}

h1 {
    color: #ff4d6d;
}

.container {
    max-width: 500px;
    margin: auto;
}

/* 任務 */
.task {
    background: white;
    margin: 10px auto;
    padding: 12px;
    border-radius: 12px;
    max-width: 400px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    border: none;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
}

.add { background: #ff85a2; color: white; }
.minus { background: #999; color: white; }

/* 分數 */
.total {
    margin-top: 15px;
    font-size: 20px;
}

.reward {
    color: #ff4d6d;
    margin-top: 10px;
}

.note {
    margin-top: 10px;
    font-size: 14px;
    color: #666;
}

/* ❤️ 愛心 */
.heart {
    font-size: 70px;
    cursor: pointer;
    margin-top: 25px;
    transition: transform 0.2s;
}

.heart.pop {
    transform: scale(1.5);
}

/* 情話 */
.message {
    margin-top: 10px;
    font-size: 18px;
    color: #d6336c;
    min-height: 30px;
}

/* 表格 */
table {
    margin: 20px auto;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #ff4d6d;
    padding: 5px 10px;
}
</style>

</head>

<body>

<h1>💖 我專屬的寶寶任務 💖</h1>

<div id="tasks"></div>

<div class="total">總分：<span id="total">0</span></div>
<div class="reward">🎁 可換麥當勞：<span id="reward">0</span></div>

<div class="note">
在原本帳號附上照片才算分喔 📸
</div>

<!-- 🔥 歸零按鈕 -->
<button onclick="resetTotal()" style="margin-top:10px; background:#ff4d6d; color:white; padding:8px 12px; border-radius:8px;">
    🔄 總分歸零
</button>

<!-- ❤️ 愛心 -->
<div class="heart" id="heart">❤️</div>
<div class="message" id="msg">今天也要想我一下喔 ❤️</div>

<h3>📅 愛心紀錄</h3>
<table>
<tr><th>日期</th><th>次數</th></tr>
<tbody id="history"></tbody>
</table>

<script>

// 任務
const list = ["倒垃圾","掃地","拖地","整理書桌","摺衣服","早睡"];

let tasks = JSON.parse(localStorage.getItem("tasks_final"));
if (!tasks) {
    tasks = list.map(t => ({name:t, score:0}));
}

// 愛心資料
let data = JSON.parse(localStorage.getItem("love_final")) || {};
let today = new Date().toISOString().split('T')[0];
let love = data[today] || 0;

// 情話
const msgs = [
    "想你 ❤️",
    "今天有乖喔 💕",
    "我在偷偷想你 😳",
    "好棒，給你抱抱 🤗",
    "寶寶最棒了 💖",
    "我愛你 ❤️"
];

// ❤️ 愛心
const heart = document.getElementById("heart");
const msg = document.getElementById("msg");

heart.onclick = () => {
    love++;
    data[today] = love;
    localStorage.setItem("love_final", JSON.stringify(data));

    heart.classList.add("pop");
    setTimeout(()=>heart.classList.remove("pop"),200);

    msg.innerText = msgs[Math.floor(Math.random()*msgs.length)];

    renderHistory();
};

// 任務操作
function save(){
    localStorage.setItem("tasks_final", JSON.stringify(tasks));
}

function add(i){
    tasks[i].score += 10;
    save();
    renderTasks();
}

function minus(i){
    tasks[i].score = Math.max(0, tasks[i].score - 10);
    save();
    renderTasks();
}

// 🔄 總分歸零
function resetTotal(){
    if(confirm("確定要把總分歸零嗎？")){
        tasks.forEach(t => t.score = 0);
        save();
        renderTasks();
    }
}

// 渲染任務
function renderTasks(){
    let html = "";
    let total = 0;

    tasks.forEach((t,i)=>{
        total += t.score;

        html += `
        <div class="task">
            <span>${t.name}：${t.score}</span>
            <div>
                <button class="add" onclick="add(${i})">+10</button>
                <button class="minus" onclick="minus(${i})">-10</button>
            </div>
        </div>`;
    });

    document.getElementById("tasks").innerHTML = html;
    document.getElementById("total").innerText = total;
    document.getElementById("reward").innerText = Math.floor(total/100);
}

// 愛心紀錄
function renderHistory(){
    let tbody = document.getElementById("history");
    tbody.innerHTML = "";

    for(let i=6;i>=0;i--){
        let d = new Date();
        d.setDate(d.getDate()-i);
        let date = d.toISOString().split('T')[0];
        let count = data[date] || 0;

        tbody.innerHTML += `<tr><td>${date}</td><td>${count}</td></tr>`;
    }
}

// 初始化
renderTasks();
renderHistory();

</script>

</body>
</html>

</script>

</body>
</html>
